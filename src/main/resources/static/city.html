<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TK RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #2b1d0e;
      font-family: 'Crimson Text', Georgia, serif;
      color: #3a2510;
      display: flex;
      flex-direction: column;
    }

    /* HUD */
    .hud {
      background: #1a0f05;
      border-bottom: 2px solid #8b6020;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hud-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: #e8c97a;
      letter-spacing: 0.1em;
    }

    .hud-stats {
      display: flex;
      gap: 1.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: #c8a060;
    }

    .hud-stat span {
      color: #f5dfa0;
      font-weight: 600;
    }

    /* NAV */
    .nav {
      background: #3a2008;
      border-bottom: 1px solid #6a4818;
      display: flex;
    }

    .nav-btn {
      flex: 1;
      padding: 0.65rem 1rem;
      background: none;
      border: none;
      border-right: 1px solid #6a4818;
      color: #c8a060;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:last-child { border-right: none; }
    .nav-btn:hover { background: #4a2810; color: #f5dfa0; }
    .nav-btn.active { background: #f5e6c8; color: #4a2c08; }

    /* MAIN */
    .main {
      flex: 1;
      padding: 1.5rem;
      background: #f5e6c8;
      margin: 1rem;
      border: 2px solid #8b6020;
      border-radius: 2px;
      box-shadow: 0 0 0 4px #2b1d0e, 0 0 0 6px #6a4818;
      min-height: 400px;
    }

    /* content inside views */
    #app h2, #app h3 {
      font-family: 'Cinzel', serif;
      color: #4a2c08;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    #app button {
      display: inline-block;
      margin: 0.25rem 0.25rem 0.25rem 0;
      padding: 0.45rem 1rem;
      background: #5a3510;
      border: 1px solid #8b6020;
      border-bottom: 2px solid #3a2008;
      color: #f5e6c8;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.15s;
    }

    #app button:hover { background: #6e4218; }

    #app hr {
      border: none;
      border-top: 1px solid #c8a060;
      margin: 1rem 0;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="hud">
    <div class="hud-title">TK RPG</div>
    <div class="hud-stats">
      <div class="hud-stat">Gold: <span id="gold">—</span></div>
      <div class="hud-stat">Level: <span id="level">—</span></div>
      <div class="hud-stat">EXP: <span id="exp">—</span></div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="render('city')">City</button>
    <button class="nav-btn" onclick="render('shop')">Shop</button>
    <button class="nav-btn" onclick="render('tavern')">Tavern</button>
    <button class="nav-btn" onclick="render('character')">Character</button>
  </div>

  <div class="main">
    <div id="app"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/hud.js"></script>
  <script src="/js/views/cityView.js"></script>
  <script src="/js/views/shopView.js"></script>
  <script src="/js/views/tavernView.js"></script>
  <script src="/js/views/characterView.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/actions.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>

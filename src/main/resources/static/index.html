<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TK RPG Register</title>
</head>
<body>
  <h1>Create Account</h1>

  <form id="registerForm">
    Email:</br>
    <input id="email" placeholder="test@email.com" /><br/><br/>
    Login:</br>
    <input id="login" placeholder="(min 3 characters)" /><br/><br/>
    Password:</br>
    <input id="password" type="password" placeholder="(min 6 chars)" /><br/><br/>
    Today's date:</br>
    <input
      type="text"
      id="date"
      placeholder="dd/mm/yyyy"
      pattern="^(0[1-9]|[12][0-9]|3[01])/(0[1-9]|1[0-2])/[0-9]{4}$"
      required
    />
    <button type="submit">Register</button>
  </form>

  <pre id="output"></pre>

  <script src="/js/register.js"></script>

</body>
</html>

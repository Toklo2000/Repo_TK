<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TK RPG — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #2b1d0e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Crimson Text', Georgia, serif;
      color: #e8d5b0;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #f5e6c8;
      border: 2px solid #8b6020;
      border-radius: 2px;
      box-shadow: 0 0 0 4px #2b1d0e, 0 0 0 6px #6a4818;
      padding: 2.5rem 2.25rem 2rem;
      color: #3a2510;
    }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #4a2c08;
      text-align: center;
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }
    .divider {
      border: none;
      border-top: 1px solid #c8a060;
      margin: 1rem 0 1.5rem;
      opacity: 0.5;
    }
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #6a4818;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      background: #fffbf0;
      border: 1px solid #c8a060;
      border-bottom: 2px solid #8b6020;
      color: #2a1a08;
      font-family: 'Crimson Text', serif;
      font-size: 1.05rem;
      padding: 0.5rem 0.7rem;
      outline: none;
      border-radius: 1px;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: #b8a080; font-style: italic; }
    input:focus { border-color: #8b6020; box-shadow: 0 0 0 2px rgba(139,96,32,0.15); }
    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.7rem 1rem;
      background: #5a3510;
      border: 1px solid #8b6020;
      border-bottom: 2px solid #3a2008;
      color: #f5e6c8;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.2s;
    }
    .btn:hover { background: #6e4218; }
    .btn:active { background: #3a2008; }
    .output {
      margin-top: 0.9rem;
      font-size: 0.92rem;
      color: #7a5828;
      font-style: italic;
      text-align: center;
      min-height: 1.2rem;
    }
    .output.error { color: #8b2020; }
    .output.success { color: #2a6020; }
    .register-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.95rem;
      color: #7a5828;
    }
    .register-link a {
      color: #5a3510;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .register-link a:hover { color: #3a2008; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="card-title">Sign In</h1>
    <hr class="divider">
    <form id="loginForm">
      <div class="field">
        <label for="login">Login</label>
        <input id="login" placeholder="your login" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="your password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="output" id="output"></div>
    <p class="register-link">Don't have an account? <a href="/register.html">Register now!</a></p>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
